spring.application.name=finwally
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finwally}
spring.datasource.username=${POSTGRES_USER:finwally_user}
spring.datasource.password=${POSTGRES_PASSWORD:finwally_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
