spring.application.name=finwally
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:finwally}}
spring.datasource.username=${POSTGRES_USER:test}
spring.datasource.password=${POSTGRES_PASSWORD:test}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
