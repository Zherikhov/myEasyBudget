spring.application.name=myeasybudget
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:myeasybudget}}
spring.datasource.username=${POSTGRES_USER:test}
spring.datasource.password=${POSTGRES_PASSWORD:test}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:true}
spring.docker.compose.file=compose.local.yaml

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.security.jwt.secret=${JWT_SECRET:change-me-in-production-with-at-least-32-characters}
app.security.jwt.expiration=${JWT_EXPIRATION:PT1H}

app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.security.rate-limit.auth.max-requests=${AUTH_RATE_LIMIT_MAX_REQUESTS:10}
app.security.rate-limit.auth.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:test}
spring.mail.password=${SPRING_MAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${APP_MAIL_FROM:no-reply@my-easy-budget.com}
app.mail.log-verification-link=${APP_MAIL_LOG_VERIFICATION_LINK:false}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.security.email-verification.token-expiration=${EMAIL_VERIFICATION_TOKEN_EXPIRATION:PT24H}